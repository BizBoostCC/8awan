<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>頁面建置中｜八丫旺實業</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=Bebas+Neue&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0a1628; --navy-mid: #132040; --steel: #1e3a5f;
  --orange: #e8600a; --orange-light: #ff7820; --silver: #c5cdd8;
  --white: #ffffff; --muted: #7a8fa8; --border: rgba(197,205,216,0.15);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--navy); color:var(--white); font-family:'Noto Sans TC',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
.container { text-align:center; padding:48px; max-width:560px; }
.code { font-family:'Bebas Neue',sans-serif; font-size:120px; color:var(--orange); line-height:1; margin-bottom:16px; }
h1 { font-family:'Noto Serif TC',serif; font-size:28px; font-weight:900; margin-bottom:16px; }
p { color:var(--silver); font-size:15px; line-height:1.8; font-weight:300; margin-bottom:32px; }
.back { display:inline-flex; align-items:center; gap:8px; background:var(--orange); color:white; padding:14px 32px; text-decoration:none; font-size:14px; font-weight:500; letter-spacing:1px; transition:all .2s; }
.back:hover { background:var(--orange-light); transform:translateY(-2px); }
.status { margin-top:48px; padding-top:32px; border-top:1px solid var(--border); color:var(--muted); font-size:12px; letter-spacing:2px; }
</style>
</head>
<body>
<div class="container">
  <div class="code">404</div>
  <h1>此頁面正在建置中</h1>
  <p>我們正在為您打造全新的網站體驗，<br>此頁面即將上線，敬請期待。</p>
  <a href="index.html" class="back">← 返回首頁</a>
  <div class="status">BAYAWANG CO., LTD. — COMING SOON</div>
</div>
</body>
</html>
