project: 8awan
batch: "01"
title: 全站子頁面建置
date: "2026-03-11"
goal: >
  將所有子頁面雛形建置完成，統一深色企業風格，
  每頁具備完整導航、CTA、響應式支援，
  讓業主看了心動、促成詢價轉換。

# ── 三位專家推理分析摘要 ──
expert_analysis:
  ui_ux_designer:
    focus: 視覺衝擊力與專業感
    top_tier:
      - 每頁高品質大圖 Banner + 統一 page-banner 組件
      - 卡片式佈局 + hover 微動效
      - 深色企業質感一致性
    pitfalls:
      - 圖片破圖或載入慢
      - 頁面間風格不一致
      - 手機版無法導航

  frontend_engineer:
    focus: 程式碼一致性與效能
    top_tier:
      - 共用 CSS pattern 從 index.html 延伸
      - 漢堡選單純 CSS+JS 實作（30 行內）
      - Unsplash 直連穩定可靠
    pitfalls:
      - 每頁 CSS 各寫各的
      - 忘記導航高亮當前頁
      - 響應式斷點不一致

  business_strategist:
    focus: 銷售漏斗轉換
    top_tier:
      - 每頁底部 CTA Strip 引導詢價
      - 產品頁強調政府採購信任感
      - 實績案例大圖說故事
    pitfalls:
      - 頁面只有資訊沒有行動呼籲
      - 品牌頁花太多時間做動畫（ROI 低）

# ── 關鍵決策 ──
decisions:
  mobile_nav: "漢堡選單 + 滑入動畫（純 CSS+JS）"
  brand_logos: "文字 + CSS 精緻卡片（避免版權問題）"
  images: "Unsplash 直連，選高品質空調/工程相關圖"
  portfolio_cases: "大圖 Gallery + 模擬真實案例名稱（6-8 個）"
  google_form: "# 佔位 + 明確提示文字"
  news_content: "擴充至 6-9 則模擬消息"

